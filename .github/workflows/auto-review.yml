name: Auto-request review
on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  request-review:
    if: github.event.pull_request.user.login != 'keyoku-bot' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request review from keyoku-bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-reviewer keyoku-bot
